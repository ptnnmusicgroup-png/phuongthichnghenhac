<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phương Thích Nghe Nhạc - Official</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        *{
            margin:0; padding:0; box-sizing:border-box;
            font-family:'Montserrat', sans-serif;
        }

        html, body { height:100%; overflow:hidden; background: #000; color:white; }

        .hidden { display:none !important; }

        /* Video Background */
        .video-container { position:fixed; inset:0; z-index:-1; }
        #bg-video { width:100%; height:100%; object-fit:cover; }
        .overlay { position:absolute; inset:0; background:rgba(0,0,0,0.4); }

        /* Layout */
        .wrapper { display:flex; height:100vh; width:100vw; }

        /* Sidebar */
        .sidebar {
            width:260px; background:rgba(15,15,15,0.9);
            backdrop-filter:blur(15px); padding:25px;
            display:flex; flex-direction:column; border-right: 1px solid rgba(255,255,255,0.05);
        }

        .sidebar-logo { font-weight:600; font-size: 18px; margin-bottom:30px; color: #fff; }

        .sidebar-nav a {
            display:flex; align-items:center; color:white;
            text-decoration:none; margin:12px 0; opacity:0.7; transition: 0.3s;
        }
        .sidebar-nav a i { margin-right: 10px; width: 20px; }
        .sidebar-nav a:hover, .sidebar-nav a.active { opacity:1; color: #3897f0; }

        .auth-section { margin-top: auto; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); }
        .btn-sidebar { 
            width:100%; padding:10px; margin-bottom:10px; border-radius:8px; 
            border:none; cursor:pointer; font-weight:600; font-size: 13px;
        }
        .btn-login { background: #333; color: white; }
        .btn-logout { background: #900; color: white; }

        /* Main Content */
        .main-content { flex:1; display:flex; flex-direction:column; position: relative; }

        .top-header {
            height:70px; display:flex; justify-content:space-between;
            align-items:center; padding:0 40px;
            background:rgba(0,0,0,0.2); backdrop-filter:blur(10px); z-index: 10;
        }

        .top-header nav a {
            color:white; text-decoration:none; margin-right:25px;
            font-size:14px; opacity:0.8; transition:0.3s;
        }
        .top-header nav a:hover { opacity:1; }

        /* Scrollable Area */
        .scroll-container {
            flex:1; overflow-y:auto; padding:30px 40px;
            display:flex; flex-direction:column; gap:30px;
            scroll-behavior: smooth;
        }

        /* Admin Post Box */
        .admin-panel {
            background: rgba(56, 151, 240, 0.1);
            border: 1px dashed #3897f0; border-radius: 15px; padding: 20px;
        }
        .admin-panel h3 { font-size: 16px; margin-bottom: 10px; color: #3897f0; }
        .admin-panel textarea {
            width: 100%; height: 80px; background: transparent; border: none;
            color: white; outline: none; resize: none; font-size: 15px;
        }
        .btn-post {
            background: #3897f0; color: white; border: none;
            padding: 8px 20px; border-radius: 5px; cursor: pointer; font-weight: 600;
        }

        /* Banner Cards */
        .banner-wrapper { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .banner-card {
            height: 180px; border-radius: 15px; padding: 25px;
            display: flex; flex-direction: column; justify-content: flex-end;
            transition: 0.3s; cursor: pointer;
        }
        .banner-card:hover { transform: translateY(-5px); }
        .creative-gradient { background: linear-gradient(135deg, #f6d365 0%, #fda085 100%); color: #442200; }
        .fanme-gradient { background: linear-gradient(135deg, #89f7fe 0%, #66a6ff 100%); color: #002244; }

        /* Posts */
        .post-card {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px; padding: 20px;
        }
        .post-user { display: flex; align-items: center; margin-bottom: 15px; }
        .avatar { width: 40px; height: 40px; background: #3897f0; border-radius: 50%; 
                  display: flex; align-items: center; justify-content: center; font-weight: 600; margin-right: 12px; }
        .user-info strong { display: block; font-size: 15px; }
        .verified { color: #3897f0; font-size: 12px; margin-left: 5px; }
        .post-text { line-height: 1.6; margin-bottom: 15px; }
        .post-footer { display: flex; gap: 20px; color: #888; font-size: 14px; }
        .post-footer span { cursor: pointer; transition: 0.2s; }
        .post-footer span:hover { color: white; }

        /* Footer */
        .site-footer {
            margin-top: 50px; padding: 40px 0; border-top: 1px solid rgba(255,255,255,0.1);
            text-align: center; color: #666; font-size: 13px; line-height: 1.8;
        }

        /* Scrollbar */
        .scroll-container::-webkit-scrollbar { width: 6px; }
        .scroll-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
    </style>
</head>
<body>

<div class="video-container">
    <video autoplay muted loop playsinline id="bg-video">
        <source src="Videos/bg.mp4" type="video/mp4">
    </video>
    <div class="overlay"></div>
</div>

<div class="wrapper">
    <aside class="sidebar">
        <div class="sidebar-logo">Phương Thích Nghe Nhạc</div>
        <nav class="sidebar-nav">
            <a href="#" class="active"><i class="fas fa-home"></i> Trang chủ</a>
            <a href="#"><i class="fas fa-plus-circle"></i> Có gì mới</a>
            <a href="#"><i class="fas fa-star"></i> Bài đăng</a>
            <a href="#"><i class="fab fa-spotify"></i> Spotify</a>
        </nav>

        <div class="auth-section">
            <div id="guest-ui">
                <button class="btn-sidebar btn-login" onclick="location.href='login.html'">Đăng nhập</button>
            </div>
            <div id="user-ui" class="hidden">
                <p id="user-name-tag" style="font-size: 12px; margin-bottom: 10px;"></p>
                <button class="btn-sidebar btn-logout" onclick="logout()">Đăng xuất</button>
            </div>
        </div>
    </aside>

    <div class="main-content">
        <header class="top-header">
            <nav>
                <a href="#">Trang chủ</a>
                <a href="#">Nội dung</a>
                <a href="#">Sự kiện</a>
                <a href="#">Cửa hàng</a>
            </nav>
            <div class="header-icons">
                <i class="fas fa-user-circle"></i>
            </div>
        </header>

        <div class="scroll-container">
            
            <section id="admin-panel" class="admin-panel hidden">
                <h3>Đăng bài mới (Admin)</h3>
                <textarea id="post-input" placeholder="Bạn đang nghĩ gì, Phương?"></textarea>
                <button class="btn-post" onclick="createPost()">Đăng bài</button>
            </section>

            <section class="banner-wrapper">
                <div class="banner-card creative-gradient">
                    <h3>Sáng Tạo Nội Dung</h3>
                </div>
                <div class="banner-card fanme-gradient">
                    <h3>Kết Nối Fanme</h3>
                </div>
            </section>

            <section class="post-section">
                <h2 style="margin-bottom: 20px; font-size: 20px;">Dòng thời gian</h2>
                <div id="feed-container">
                    </div>
            </section>

            <footer class="site-footer">
                <strong>2026 Phương Thích Nghe Nhạc - All right reserverd</strong><br>
                Phone: +84 843340112<br>
                E-mail: ptnn.musicgroup@gmail.com
            </footer>

        </div>
    </div>
</div>

<script>
    // 1. NHẬN DIỆN ADMIN KHI LOAD TRANG
    document.addEventListener('DOMContentLoaded', () => {
        const session = JSON.parse(localStorage.getItem('userSession'));
        const adminPanel = document.getElementById('admin-panel');
        const guestUI = document.getElementById('guest-ui');
        const userUI = document.getElementById('user-ui');
        const userNameTag = document.getElementById('user-name-tag');

        if (session) {
            guestUI.classList.add('hidden');
            userUI.classList.remove('hidden');
            userNameTag.innerHTML = `Đang vào: <b>${session.name}</b>`;
            
            // Nếu là admin thì hiện ô đăng bài
            if (session.role === 'admin') {
                adminPanel.classList.remove('hidden');
            }
        }
        renderPosts();
    });

    // 2. LOGIC ĐĂNG BÀI (LƯU & NÉN LOCALSTORAGE)
    function createPost() {
        const input = document.getElementById('post-input');
        const content = input.value.trim();
        if (!content) return;

        const session = JSON.parse(localStorage.getItem('userSession'));
        const posts = JSON.parse(localStorage.getItem('ptnn_posts')) || [];

        const newPost = {
            id: Date.now(),
            author: session.name,
            text: content,
            date: new Date().toLocaleDateString('vi-VN'),
            likes: 0
        };

        posts.unshift(newPost);
        localStorage.setItem('ptnn_posts', JSON.stringify(posts)); // Nén thành chuỗi JSON
        input.value = '';
        renderPosts();
    }

    // 3. HIỂN THỊ BÀI ĐĂNG
    function renderPosts() {
        const container = document.getElementById('feed-container');
        const posts = JSON.parse(localStorage.getItem('ptnn_posts')) || [];
        
        container.innerHTML = posts.map(post => `
            <div class="post-card">
                <div class="post-user">
                    <div class="avatar">P</div>
                    <div class="user-info">
                        <strong>${post.author} <i class="fas fa-check-circle verified"></i></strong>
                        <span style="font-size: 11px; color: #888;">${post.date}</span>
                    </div>
                </div>
                <div class="post-body">
                    <p class="post-text">${post.text}</p>
                </div>
                <div class="post-footer">
                    <span><i class="far fa-heart"></i> ${post.likes}</span>
                    <span><i class="far fa-comment"></i> Phản hồi</span>
                </div>
            </div>
        `).join('');
    }

    function logout() {
        localStorage.removeItem('userSession');
        location.reload();
    }
</script>

</body>
</html>
