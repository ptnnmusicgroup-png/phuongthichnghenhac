<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phương Thích Nghe Nhạc - Official</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/your-code.js" crossorigin="anonymous"></script>
</head>
<body>

    <div class="video-container">
        <iframe 
            id="bg-player"
            src="https://www.youtube.com/embed/t6SFt_hJnIA?enablejsapi=1&autoplay=1&mute=1&loop=1&playlist=t6SFt_hJnIA&controls=0" 
            allow="autoplay; encrypted-media" 
            frameborder="0">
        </iframe>
        <div class="overlay"></div>
    </div>

    <header>
        <div class="logo">Phương Thích Nghe Nhạc</div>
        <nav>
            <ul>
                <li><a href="#">Trang chủ</a></li>
                <li><a href="#">Nội dung</a></li>
                <li><a href="#">Lịch trình</a></li>
                <li><a href="#">Sự kiện</a></li>
                <li><a href="#">Cửa hàng</a></li>
            </ul>
        </nav>
        <div class="header-icons">
            <i class="fas fa-external-link-alt"></i>
            <i class="fas fa-shopping-cart"></i>
            <i class="fas fa-user"></i>
        </div>
    </header>

    <main class="hero">
        <div class="content-box">
            <img src="star-icon.png" alt="★" class="star-animation" style="width: 50px;">
            <h1>PHƯƠNG THÍCH NGHE NHẠC</h1>
            <p>Website chính thức của Phương Thích Nghe Nhạc</p>
            
            <div class="social-icons">
                <i class="fab fa-facebook"></i>
                <i class="fab fa-instagram"></i>
                <i class="fab fa-youtube"></i>
                <i class="fab fa-tiktok"></i>
                <i class="fab fa-spotify"></i>
            </div>

            <button class="btn-join" id="play-button">Tham gia & Nghe nhạc</button>
        </div>
    </main>

    <script>
        const player = document.getElementById('bg-player');
        const btn = document.getElementById('play-button');

        // Khi bấm vào nút "Tham gia", nhạc sẽ tự bật tiếng
        btn.addEventListener('click', function() {
            player.contentWindow.postMessage('{"event":"command","func":"unMute","args":""}', '*');
            player.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
            alert("Chúc bạn nghe nhạc vui vẻ!");
        });

        // Hoặc chỉ cần click bất kỳ đâu trên trang web là nhạc sẽ bật
        document.body.addEventListener('click', function() {
            player.contentWindow.postMessage('{"event":"command","func":"unMute","args":""}', '*');
        }, { once: true });
    </script>

</body>
</html>
