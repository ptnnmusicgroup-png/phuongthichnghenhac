<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phương Thích Nghe Nhạc - Official</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/your-code.js" crossorigin="anonymous"></script>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Montserrat',sans-serif;
        }

        html,body{
            height:100%;
            overflow:hidden;
        }

        body{
            color:white;
        }

        .hidden{display:none !important;}

        .video-container{
            position:fixed;
            inset:0;
            z-index:-1;
        }

        #bg-video{
            width:100%;
            height:100%;
            object-fit:cover;
        }

        .overlay{
            position:absolute;
            inset:0;
            background:rgba(0,0,0,0.25);
        }

        .wrapper{
            display:flex;
            height:100vh;
            width:100vw;
        }

        .sidebar{
            width:260px;
            background:rgba(20,20,20,0.85);
            backdrop-filter:blur(10px);
            padding:20px;
        }

        .sidebar-logo{
            font-weight:600;
            margin-bottom:20px;
        }

        .sidebar-nav a{
            display:block;
            color:white;
            text-decoration:none;
            margin:15px 0;
            opacity:0.8;
        }

        .btn-auth, .btn-logout{
            margin-top:10px;
            padding:8px 12px;
            border:none;
            border-radius:8px;
            cursor:pointer;
            width:100%;
        }

        .btn-auth{background:#222;color:white;}
        .btn-logout{background:#900;color:white;}

        .main-content{
            flex:1;
            display:flex;
            flex-direction:column;
        }

        .top-header{
            height:70px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:0 30px;
            background:rgba(0,0,0,0.35);
            backdrop-filter:blur(6px);
        }

        .scroll-container{
            flex:1;
            overflow-y:auto;
            padding:30px;
            display:flex;
            flex-direction:column;
            gap:25px;
        }

        /* HERO BANNER */
        .hero-banner{
            text-align:center;
            padding:60px 20px;
            border:1px solid rgba(255,255,255,0.15);
            border-radius:16px;
            background:rgba(0,0,0,0.35);
            backdrop-filter:blur(10px);
        }

        .hero-banner h1{
            font-size:40px;
            margin-bottom:10px;
        }

        .hero-banner p{
            opacity:0.8;
            margin-bottom:20px;
        }

        .btn-listen{
            padding:12px 28px;
            border:none;
            border-radius:999px;
            background:white;
            color:black;
            font-weight:600;
            cursor:pointer;
            transition:0.25s;
        }

        .btn-listen:hover{
            transform:scale(1.05);
            box-shadow:0 0 20px rgba(255,255,255,0.4);
        }

        .site-footer{
            margin-top:auto;
            padding:30px;
            border-top:1px solid rgba(255,255,255,0.1);
            text-align:center;
            color:#888;
            font-size:13px;
            line-height:1.8;
        }

        /* TOP NAV FIX */
        .top-header nav{
            display:flex;
            align-items:center;
            gap:25px;
            margin-left:auto;
            margin-right:30px;
        }

        .top-header nav a{
            color:#ffffff;
            text-decoration:none;
            font-size:14px;
            opacity:0.85;
            transition:0.25s ease;
        }

        .top-header nav a:hover{
            opacity:1;
            text-shadow:0 0 8px rgba(255,255,255,0.6);
        }
    </style>
</head>
<body>

<div class="video-container">
    <video autoplay muted loop playsinline id="bg-video">
        <source src="Videos/bg.mp4" type="video/mp4">
    </video>
    <div class="overlay"></div>
</div>

<div class="wrapper">

    <aside class="sidebar">
        <div class="sidebar-logo">Phương Thích Nghe Nhạc</div>

        <nav class="sidebar-nav">
            <a href="#">Trang chủ</a>
            <a href="#">Nội dung</a>
            <a href="#">Cửa hàng</a>

            <div style="margin-top:20px">
                <button class="btn-auth" onclick="location.href='https://your-login-site.com'">Đăng nhập</button>
                <button class="btn-auth" onclick="location.href='https://your-login-site.com/register'">Đăng ký</button>
            </div>
        </nav>
    </aside>

    <div class="main-content">

        <header class="top-header">
            <nav>
                <a href="#">Trang chủ</a>
                <a href="#">Nội dung</a>
                <a href="#">Cửa hàng</a>
            </nav>
        </header>

        <div class="scroll-container">

            <!-- HERO BANNER -->
            <section class="hero-banner">
                <h1>Phương Thích Nghe Nhạc</h1>
                <p>Official page from Phương Thích Nghe Nhạc</p>
                <button class="btn-listen">Listen now!</button>
            </section>

            <footer class="site-footer">
                2026 Phương Thích Nghe Nhạc - All rights reserved<br>
                Phone: +84 843340112<br>
                E-mail: ptnn.musicgroup@gmail.com
            </footer>

        </div>
    </div>
</div>

</body>
</html>
