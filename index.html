<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phương Thích Nghe Nhạc - Official</title>
    
    <link rel="stylesheet" href="style.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div class="video-container">
    <video autoplay muted loop playsinline id="bg-video">
        <source src="Videos/bg.mp4" type="video/mp4">
    </video>
    <div class="overlay"></div>
</div>  
        <div class="overlay"></div>
    </div>

    <header>
        <div class="logo">Phương Thích Nghe Nhạc</div>
        <nav>
            <ul>
                <li><a href="#">Trang chủ</a></li>
                <li><a href="#">Nội dung</a></li>
                <li><a href="#">Lịch trình</a></li>
                <li><a href="#">Sự kiện</a></li>
                <li><a href="#">Cửa hàng</a></li>
            </ul>
        </nav>
        <div class="header-icons">
            <i class="fas fa-external-link-alt"></i>
            <i class="fas fa-shopping-cart"></i>
            <i class="fas fa-user"></i>
        </div>
    </header>

    <main class="hero">
        <div class="content-box">
            <img src="star-icon.png" alt="★" class="star-animation" style="width: 50px;">
            
            <h1>PHƯƠNG THÍCH NGHE NHẠC</h1>
            <p>Website chính thức của Phương Thích Nghe Nhạc</p>
            
            <div class="social-icons">
                <i class="fab fa-facebook"></i>
                <i class="fab fa-instagram"></i>
                <i class="fab fa-youtube"></i>
                <i class="fab fa-tiktok"></i>
                <i class="fab fa-spotify"></i>
            </div>

            <button class="btn-join" id="play-button">Tham gia & Nghe nhạc</button>
        </div>
    </main>

    <script>
        const player = document.getElementById('bg-player');
        const btn = document.getElementById('play-button');

        // Hàm bật tiếng qua YouTube API postMessage
        function unmuteVideo() {
            player.contentWindow.postMessage('{"event":"command","func":"unMute","args":""}', '*');
            player.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
        }

        // 1. Khi bấm vào nút "Tham gia"
        btn.addEventListener('click', function() {
            unmuteVideo();
            alert("Chúc bạn nghe nhạc vui vẻ!");
        });

        // 2. Tự động bật tiếng khi người dùng click bất cứ đâu (giúp vượt rào cản Autoplay của trình duyệt)
        document.body.addEventListener('click', function() {
            unmuteVideo();
        }, { once: true }); // 'once: true' giúp lệnh này chỉ chạy 1 lần duy nhất
    </script>

</body>
</html>
