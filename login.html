<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gia nhập | Phương Thích Nghe Nhạc</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(-45deg, #000000, #1a1a1a, #0d1b2a, #000000);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .login-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 30px;
            width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            transition: 0.3s;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 600;
            color: #fff;
            letter-spacing: 2px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        /* Tabs cho Đăng nhập / Đăng ký */
        .auth-tabs {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
        }

        .tab-item {
            color: #888;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            padding: 5px 10px;
            transition: 0.3s;
            border-bottom: 2px solid transparent;
        }

        .tab-item.active {
            color: #3897f0;
            border-bottom: 2px solid #3897f0;
        }

        .input-group {
            position: relative;
            margin-bottom: 15px;
            text-align: left;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #555;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: #3897f0;
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-submit:hover {
            background: #3897f0;
            color: #fff;
            box-shadow: 0 10px 20px rgba(56, 151, 240, 0.3);
        }

        .footer-note {
            margin-top: 25px;
            font-size: 11px;
            color: #555;
        }

        .hidden { display: none; }
        
        .bg-overlay {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.8) 100%);
        }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <div class="login-card">
        <div class="logo-text">Phương Thích Nghe Nhạc</div>
        
        <div class="auth-tabs">
            <span id="tab-login" class="tab-item active" onclick="toggleMode('login')">ĐĂNG NHẬP</span>
            <span id="tab-signup" class="tab-item" onclick="toggleMode('signup')">ĐĂNG KÝ</span>
        </div>

        <div id="login-form">
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" id="username" placeholder="Tên đăng nhập">
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="Mật khẩu">
            </div>
            <button class="btn-submit" onclick="checkLogin()">Đăng nhập</button>
        </div>

        <div id="signup-form" class="hidden">
            <div class="input-group">
                <i class="fas fa-id-card"></i>
                <input type="text" id="reg-user" placeholder="Tạo tên tài khoản">
            </div>
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="reg-email" placeholder="Email của bạn">
            </div>
            <div class="input-group">
                <i class="fas fa-key"></i>
                <input type="password" id="reg-pass" placeholder="Tạo mật khẩu">
            </div>
            <button class="btn-submit" style="background:#2ecc71; color:white;" onclick="handleSignup()">Tạo tài khoản</button>
        </div>

        <div class="footer-note">
            © 2026 Nguyễn Đặng Phương Studio <br>
            Protected by PTNN Music Group
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        function toggleMode(mode) {
            const loginF = document.getElementById('login-form');
            const signupF = document.getElementById('signup-form');
            const tabL = document.getElementById('tab-login');
            const tabS = document.getElementById('tab-signup');

            if(mode === 'login') {
                loginF.classList.remove('hidden');
                signupF.classList.add('hidden');
                tabL.classList.add('active');
                tabS.classList.remove('active');
            } else {
                loginF.classList.add('hidden');
                signupF.classList.remove('hidden');
                tabS.classList.add('active');
                tabL.classList.remove('active');
            }
        }
    </script>
</body>
</html>
