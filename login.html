<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập | Phương Thích Nghe Nhạc</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Tạo màu nền gradient chuyển động theo phong cách nghệ sĩ */
            background: linear-gradient(-45deg, #000000, #1a1a1a, #0d1b2a, #000000);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Khung đăng nhập Glassmorphism */
        .login-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 50px 40px;
            border-radius: 30px;
            width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }

        .login-card:hover {
            transform: translateY(-5px);
            border: 1px solid rgba(56, 151, 240, 0.4);
        }

        .logo-text {
            font-size: 20px;
            font-weight: 600;
            color: #fff;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .sub-text {
            color: #888;
            font-size: 13px;
            margin-bottom: 35px;
        }

        /* Input thiết kế lại chuyên nghiệp */
        .input-group {
            position: relative;
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #555;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: #3897f0;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 15px rgba(56, 151, 240, 0.2);
        }

        /* Nút đăng nhập hiệu ứng sáng */
        .btn-submit {
            width: 100%;
            padding: 15px;
            margin-top: 10px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-submit:hover {
            background: #3897f0;
            color: #fff;
            box-shadow: 0 10px 20px rgba(56, 151, 240, 0.3);
        }

        .footer-note {
            margin-top: 30px;
            font-size: 11px;
            color: #555;
        }

        /* Video nền mờ nhẹ nếu có */
        .bg-overlay {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.8) 100%);
        }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <div class="login-card">
        <div class="logo-text">Phương Thích Nghe Nhạc</div>
        <div class="sub-text">Hệ thống Quản trị Nghệ sĩ</div>

        <div class="input-group">
            <i class="fas fa-user"></i>
            <input type="text" id="username" placeholder="Tên đăng nhập">
        </div>

        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" placeholder="Mật khẩu">
        </div>

        <button class="btn-submit" onclick="checkLogin()">Đăng nhập ngay</button>

        <div class="footer-note">
            © 2026 Nguyễn Đặng Phương Studio <br>
            Protected by PTNN Music Group
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
